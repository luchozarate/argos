services:

  postgres:
    image: postgres:17
    container_name: argos-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: argos
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos"]
      interval: 10s
      timeout: 5s
      retries: 5


  adminer:
    image: adminer
    container_name: argos-adminer

    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy


  backend:
    build:
      context: ./backend

    container_name: argos-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: